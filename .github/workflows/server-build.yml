name: Build Server

on:
  push:
    branches: [main, master]
    paths:
      - 'server/**'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache server dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('server/**/*.java') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Compile server
        working-directory: server
        run: |
          mkdir -p build
          javac -d build BuildServer.java
          echo "Server compiled successfully"

      - name: Package server JAR
        working-directory: server
        run: |
          cd build
          jar cfe BuildServer.jar BuildServer *.class
          echo "Server JAR created"

      - name: Upload server JAR
        uses: actions/upload-artifact@v4
        with:
          name: BuildServer-JAR
          path: server/build/BuildServer.jar
          if-no-files-found: error

      - name: Verify server starts
        working-directory: server
        run: |
          java -cp build BuildServer &
          SERVER_PID=$!
          sleep 3
          if curl -s http://localhost:8080/api/health | grep -q '"status":"ok"'; then
            echo "Health check passed"
          else
            echo "Health check failed"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi
          kill $SERVER_PID 2>/dev/null || true

      - name: Test API endpoints
        working-directory: server
        run: |
          java -cp build BuildServer &
          SERVER_PID=$!
          sleep 3
          echo "=== Health endpoint ==="
          curl -s http://localhost:8080/api/health
          echo ""
          echo "=== Root endpoint ==="
          curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:8080/
          echo ""
          echo "=== Build endpoint (GET - should return 405) ==="
          curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:8080/api/build
          echo ""
          echo "=== Unknown endpoint ==="
          curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:8080/api/unknown
          echo ""
          kill $SERVER_PID 2>/dev/null || true
